<!DOCTYPE html>
<html>
<head>
    <title>Sigma_TreesGames | Math</title>
    <!-- Secret script to force games through school proxies -->
    <script type="module" src="https://unpkg.com"></script>
    <style>
        :root { --bg: #022c22; --text: #ecfdf5; --header: #000; --accent: #10b981; --card: #064e3b; }
        .light-mode { --bg: #fff; --text: #202124; --header: #f1f3f4; --accent: #1a73e8; --card: #e8f0fe; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; min-height: 100vh; transition: 0.1s; }
        
        .header-bar { background-color: var(--header); padding: 15px; border-bottom: 3px solid var(--accent); position: relative; }
        h1 { color: var(--accent); margin: 0; font-size: 2em; }
        
        .theme-btn { position: absolute; top: 15px; right: 20px; padding: 10px; cursor: pointer; border-radius: 8px; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; }
        .warning-msg { background: #7f1d1d; color: #fecaca; padding: 10px; font-size: 0.85em; font-weight: bold; border-bottom: 2px solid #b91c1c; }

        .category-menu { display: flex; justify-content: center; gap: 15px; padding: 20px; background: rgba(0,0,0,0.1); flex-wrap: wrap; }
        .cat-btn { background: var(--accent); color: white; padding: 15px 30px; border-radius: 15px; font-weight: 900; cursor: pointer; border: none; font-size: 1.1em; transition: 0.2s; box-shadow: 0 5px 0 #059669; }
        .cat-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #059669; }

        .gallery { display: none; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 20px; }
        .active-gallery { display: flex; }
        
        .game-card { width: 95px; cursor: pointer; transition: 0.3s; border-radius: 12px; padding: 12px; background: var(--card); border: 2px solid var(--accent); }
        .game-card:hover { transform: scale(1.1); background: #000; border-color: #fff; }
        .game-icon { font-size: 40px; display: block; margin-bottom: 8px; }
        .game-card span { font-size: 0.6em; font-weight: bold; display: block; text-transform: uppercase; }

        #game-box-wrapper { width: 85%; max-width: 650px; height: 380px; margin: 20px auto; border: 5px solid var(--accent); border-radius: 15px; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .controls { margin-top: 10px; display: flex; justify-content: center; gap: 10px; padding-bottom: 80px; }
        .btn-action { background: var(--accent); color: white; padding: 12px 24px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; }
        .btn-tab { background: #1e40af; }
        
        .version-tag { position: fixed; bottom: 10px; right: 15px; color: var(--accent); font-size: 0.7em; font-weight: bold; background: var(--header); padding: 5px 10px; border-radius: 5px; }
        .stealth-hide { display: none !important; }
    </style>
</head>
<body onkeydown="if(event.key.toLowerCase()==='p')toggleTheme()">

    <div id="hub-content">
        <div class="header-bar">
            <button class="theme-btn" onclick="toggleTheme()">STEALTH (P)</button>
            <h1 id="main-title">Sigma_TreesGames</h1>
        </div>

        <div class="warning-msg">
            ⚠️ v1.2.2 Stable Mirrors. Press 'P' for Stealth Mode.
        </div>

        <div class="category-menu">
            <div class="cat-btn" onclick="showCategory('shooters')">🔫 SHOOTERS</div>
            <div class="cat-btn" onclick="showCategory('chill')">🌊 CHILL</div>
            <div class="cat-btn" onclick="showCategory('snakey')">🐍 SNAKEY</div>
        </div>

        <!-- SHOOTERS (Mirror Mode) -->
        <div id="shooters" class="gallery">
            <div class="game-card" onclick="changeGame('https://pages.dev', 'Shell')"><span class="game-icon">🥚</span><span>Shell</span></div>
            <div class="game-card" onclick="changeGame('https://pages.dev', 'Craftnite')"><span class="game-icon">⛏️</span><span>Craftnite</span></div>
            <div class="game-card" onclick="changeGame('https://krunker.io', 'Krunker')"><span class="game-icon">🎯</span><span>Krunker</span></div>
            <div class="game-card" onclick="changeGame('https://github.io', 'Tanks 1')"><span class="game-icon">🚜</span><span>Tanks 1</span></div>
            <div class="game-card" onclick="changeGame('https://pages.dev', 'Tanks 2')"><span class="game-icon">🚀</span><span>Tanks 2</span></div>
        </div>

        <!-- CHILL -->
        <div id="chill" class="gallery active-gallery">
            <div class="game-card" onclick="changeGame('https://pages.dev', 'Krew.io')"><span class="game-icon">⛵</span><span>Krew.io</span></div>
            <div class="game-card" onclick="changeGame('https://dashmetry.com', 'Dashmentry')"><span class="game-icon">🏃</span><span>Dashmentry</span></div>
            <div class="game-card" onclick="changeGame('https://pages.dev', 'Bloxd.io')"><span class="game-icon">🧱</span><span>Bloxd.io</span></div>
        </div>

        <!-- SNAKEY (Mirror Mode - Like v1.1.4) -->
        <div id="snakey" class="gallery">
            <div class="game-card" onclick="changeGame('https://pages.dev', 'WormZone')"><span class="game-icon">🪱</span><span>WormZone</span></div>
            <div class="game-card" onclick="changeGame('https://github.io', 'Mope.io')"><span class="game-icon">🐷</span><span>Mope.io</span></div>
            <div class="game-card" onclick="changeGame('https://github.io', 'FlyOrDie')"><span class="game-icon">🪰</span><span>FlyOrDie</span></div>
            <!-- LITTLE BIG SNAKE (RESTORED v1.1.4 MIRROR) -->
            <div class="game-card" onclick="changeGame('https://littlebigsnake.io', 'Big Snake')"><span class="game-icon">🐍</span><span>Snake</span></div>
        </div>

        <h3 id="play-text" style="color:var(--accent); margin-top:20px;">v1.2.2 Math Resources</h3>

        <div id="game-box-wrapper">
            <iframe id="main-game" is="x-frame-bypass" src="about:blank" allow="fullscreen" allowfullscreen></iframe>
        </div>

        <div class="controls">
            <button class="btn-action" onclick="goFullscreen();">FULLSCREEN</button>
            <button class="btn-action btn-tab" onclick="launchNewTab();">NEW TAB</button>
        </div>
    </div>

    <div class="version-tag">v1.2.2</div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            let stealth = document.body.classList.contains('light-mode');
            document.getElementById('hub-content').classList.toggle('stealth-hide', stealth);
            document.title = stealth ? "Advanced Mathematics Research" : "Sigma_TreesGames | Math";
        }
        function showCategory(catId) {
            document.querySelectorAll('.gallery').forEach(g => g.classList.remove('active-gallery'));
            document.getElementById(catId).classList.add('active-gallery');
        }
        function changeGame(url, name) {
            document.getElementById('main-game').src = url;
            document.getElementById('play-text').innerText = "Playing: " + name;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
        function launchNewTab() {
            var url = document.getElementById('main-game').src;
            if(url !== "about:blank") window.open(url, '_blank');
        }
        function goFullscreen() {
            var elem = document.getElementById("game-box-wrapper");
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        }
    </script>
</body>
</html>
