<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sigma_Trees | Advanced Math</title>
    <style>
        :root { --bg: #051d14; --text: #e2e8f0; --accent: #10b981; --card: #064e3b; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; text-align: center; }
        
        /* Header & Avatar */
        .header { padding: 20px; border-bottom: 3px solid var(--accent); background: rgba(0,0,0,0.3); }
        .avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent); }
        
        /* Categories */
        .nav { display: flex; justify-content: center; gap: 10px; padding: 15px; flex-wrap: wrap; }
        .btn { background: var(--card); border: 2px solid var(--accent); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: var(--accent); }

        /* Proxy Bar */
        .proxy-bar { margin: 20px; }
        #urlInput { width: 50%; padding: 10px; border-radius: 20px; border: 2px solid var(--accent); background: #000; color: #fff; }

        /* Game Grid */
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; }
        .card { background: var(--card); width: 100px; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .card:hover { transform: scale(1.05); border: 1px solid var(--accent); }

        /* The Game Box */
        #game-wrapper { width: 90%; max-width: 900px; height: 550px; margin: 20px auto; border: 4px solid var(--accent); border-radius: 15px; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Stealth Screen */
        #stealth-overlay { display: none; position: fixed; inset: 0; background: white; color: black; z-index: 10000; justify-content: center; align-items: center; font-size: 2rem; flex-direction: column; }
    </style>
</head>
<body>

<div id="stealth-overlay">
    <h2>Weekly Calculus Assessment</h2>
    <p id="math-q">Solve: ∫ (3x² + 2x) dx</p>
</div>

<div class="header">
    <img src="https://ibb.co" class="avatar">
    <h1>Sigma_Trees Games</h1>
    <p>v1.1.8 | Ready for Research</p>
</div>

<div class="nav">
    <button class="btn" style="background:#1a73e8" onclick="toggleStealth()">STEALTH (P)</button>
    <button class="btn" style="background:#d97706" onclick="deepFullscreen()">TRUE FULLSCREEN</button>
</div>

<div class="proxy-bar">
    <input type="text" id="urlInput" placeholder="Enter URL to Proxy (e.g. google.com)">
    <button class="btn" onclick="launchProxy()">GO</button>
</div>

<div class="grid">
    <div class="card" onclick="load('https://krew.io')">⛵<span>Krew.io</span></div>
    <div class="card" onclick="load('https://craftnite.io')">⛏️<span>Craftnite</span></div>
    <div class="card" onclick="load('https://bloxd.io')">🧱<span>Bloxd.io</span></div>
    <div class="card" onclick="load('https://geometrydashfullversion.io')">🟦<span>GD Full</span></div>
    <div class="card" onclick="load('https://github.io')">🐒<span>Monkey Mart</span></div>
    <div class="card" onclick="load('https://shellshock.io')">🥚<span>Shell Shock</span></div>
    <div class="card" onclick="load('https://krunker.io')">🎯<span>Krunker</span></div>
    <div class="card" onclick="load('https://github.io')">🔫<span>Gun Mayhem</span></div>
    <div class="card" onclick="load('https://mope.io')">🐷<span>Mope.io</span></div>
    <div class="card" onclick="load('https://flyordie.io')">🪰<span>FlyOrDie</span></div>
</div>

<div id="game-wrapper">
    <iframe id="main-frame" src="about:blank" allow="fullscreen"></iframe>
</div>

<script>
    const blacklist = ["porn", "xvideo", "hub", "hentai", "sex"];

    function load(url) { document.getElementById('main-frame').src = url; }

    function launchProxy() {
        let val = document.getElementById('urlInput').value.toLowerCase();
        if (blacklist.some(w => val.includes(w))) { alert("Site Blocked by Sigma_Trees"); return; }
        load(val.includes('http') ? val : "https://" + val);
    }

    function toggleStealth() {
        let over = document.getElementById('stealth-overlay');
        over.style.display = (over.style.display === 'flex') ? 'none' : 'flex';
    }

    // FIXED: This now targets the entire screen
    function deepFullscreen() {
        let elem = document.getElementById('game-wrapper');
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    }

    // Key Listeners
    let escTimer;
    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'p') toggleStealth();
        if (e.key === "Escape") {
            escTimer = setTimeout(() => {
                if (document.fullscreenElement) document.exitFullscreen();
            }, 2000); // Must hold for 2 seconds
        }
    });

    document.addEventListener('keyup', (e) => { if (e.key === "Escape") clearTimeout(escTimer); });
</script>
</body>
</html>
