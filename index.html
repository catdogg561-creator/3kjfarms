<!DOCTYPE html>
<html>
<head>
    <title>Sigma_TreesGames | Dr. Donut's Den</title>
    <style>
        /* Black Header and Forest Green Body */
        body { 
            background-color: #022c22; 
            color: #ecfdf5; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin: 0; padding: 0; 
        }
        
        .header-bar {
            background-color: #000000;
            padding: 20px 0;
            border-bottom: 3px solid #10b981;
            margin-bottom: 20px;
        }

        h1 { color: #10b981; margin: 0; font-size: 2.5em; text-shadow: 2px 2px #000; }
        
        /* Smaller Search Bar */
        .search-container { margin: 10px 0; }
        #gameSearch {
            padding: 10px;
            width: 250px;
            border-radius: 20px;
            border: 2px solid #10b981;
            background: #064e3b;
            color: white;
            outline: none;
        }

        /* Smaller Game Window */
        #game-container {
            width: 80%; /* Shrunk from 95% */
            max-width: 800px;
            height: 450px; /* Shrunk from 650px */
            margin: 0 auto;
            border: 5px solid #059669;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Controls Area Under Game */
        .game-controls {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn { 
            background: #059669; color: white; padding: 10px 20px; 
            text-decoration: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; border: none; font-size: 0.9em;
        }
        .btn:hover { background: #10b981; transform: translateY(-2px); }
        .btn-tab { background: #1e40af; } /* Blue for New Tab */

        .mascot { width: 60px; border-radius: 50%; border: 2px solid #10b981; margin-bottom: 10px; }
        .game-selection { margin: 20px; }
    </style>
</head>
<body>

    <div class="header-bar">
        <img src="https://placeholder.com" class="mascot" alt="Dr. Donut">
        <h1>Sigma_TreesGames</h1>
        <div class="search-container">
            <input type="text" id="gameSearch" placeholder="Search games..." onkeyup="searchGame()">
        </div>
    </div>

    <div class="game-selection">
        <p>Select a Game:</p>
        <button class="btn" onclick="changeGame('https://krew.io')">Krew.io</button>
        <!-- Add more game buttons here in the future -->
    </div>

    <div id="game-box-wrapper">
        <div id="game-container">
            <iframe id="main-game" src="https://krew.io" allow="fullscreen" allowfullscreen></iframe>
        </div>

        <div class="game-controls">
            <!-- Fullscreen Button now at the bottom of the game -->
            <button class="btn" onclick="goFullscreen();">FULLSCREEN</button>
            <!-- New Tab Launch Option -->
            <button class="btn btn-tab" onclick="launchNewTab();">OPEN IN NEW TAB</button>
        </div>
    </div>

    <script>
        function changeGame(url) {
            document.getElementById('main-game').src = url;
        }

        function launchNewTab() {
            var currentGameUrl = document.getElementById('main-game').src;
            window.open(currentGameUrl, '_blank');
        }

        function goFullscreen() {
            var elem = document.getElementById("game-container");
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        }

        function searchGame() {
            let input = document.getElementById('gameSearch').value.toLowerCase();
            console.log("Searching: " + input);
        }
    </script>
</body>
</html>
