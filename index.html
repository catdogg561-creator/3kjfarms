<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Mathematics Research</title>
    <style>
        :root {
            --bg: #051d14; /* Darkish Green */
            --text: #e2e8f0;
            --accent: #10b981; /* Sigma Green */
            --card: #064e3b;
        }

        .stealth-active {
            --bg: #ffffff;
            --text: #000000;
            --accent: #1a73e8;
            --card: #f1f3f4;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding-bottom: 50px;
            transition: 0.1s; /* Faster transition for less lag */
        }

        .header { background: rgba(0,0,0,0.3); padding: 15px; border-bottom: 3px solid var(--accent); }
        h1 { color: var(--accent); margin: 0; font-size: 1.8rem; }
        
        .nav-bar { margin: 15px 0; display: flex; justify-content: center; gap: 10px; }
        button { 
            background: var(--accent); border: none; color: white; padding: 10px 20px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }

        .search-box { margin-bottom: 20px; }
        #gameSearch { 
            padding: 12px; width: 300px; border-radius: 20px; border: 2px solid var(--accent);
            background: rgba(0,0,0,0.2); color: white; outline: none; text-align: center;
        }

        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 0 20px; }
        .game-card { 
            background: var(--card); width: 110px; padding: 15px; border-radius: 12px; 
            cursor: pointer; border: 2px solid transparent; transition: 0.2s;
        }
        .game-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .game-card span { display: block; font-size: 0.8rem; margin-top: 8px; font-weight: bold; }

        /* Game Engine Wrapper */
        #game-container { 
            width: 90%; max-width: 900px; height: 500px; margin: 25px auto; 
            border: 5px solid var(--accent); border-radius: 15px; overflow: hidden; background: #000;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .version { position: fixed; bottom: 10px; right: 15px; font-size: 0.7rem; opacity: 0.6; }
        
        /* Stealth Overlay */
        #math-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; color: black; z-index: 9999; justify-content: center; 
            align-items: center; flex-direction: column; font-size: 2rem; text-align: center;
        }
    </style>
</head>
<body>

<div id="math-overlay">
    <h2>Calculus II: Weekly Assignment</h2>
    <p id="math-q">Solve for x: 2x² - 8x + 6 = 0</p>
    <p style="font-size: 1rem; color: #666;">Press 'P' to return to research</p>
</div>

<div class="header">
    <h1 id="main-title">Sigma_Trees Games</h1>
</div>

<div class="nav-bar">
    <button onclick="toggleStealth()">STEALTH MODE (P)</button>
    <button onclick="goFullscreen()">FULL FULLSCREEN</button>
</div>

<div class="search-box">
    <input type="text" id="gameSearch" placeholder="🔍 Search Math Resources..." onkeyup="search()">
</div>

<div class="gallery">
    <!-- Row 1 -->
    <div class="game-card" onclick="load('https://krew.io', 'Krew.io')">⛵<span>Krew.io</span></div>
    <div class="game-card" onclick="load('https://craftnite.io', 'Craftnite')">⛏️<span>Craftnite.io</span></div>
    <div class="game-card" onclick="load('https://bloxd.io', 'Bloxd.io')">🧱<span>Bloxd.io</span></div>
    <div class="game-card" onclick="load('https://geometrydashfullversion.io', 'GD Full')">🟦<span>Geometry Dash</span></div>
    
    <!-- Row 2 -->
    <div class="game-card" onclick="load('https://github.io', 'Monkey Mart')">🐒<span>Monkey Mart</span></div>
    <div class="game-card" onclick="load('https://shellshock.io', 'Shell Shockers')">🥚<span>Shell Shock</span></div>
    <div class="game-card" onclick="load('https://krunker.io', 'Krunker')">🎯<span>Krunker</span></div>
    <div class="game-card" onclick="load('https://github.io', 'Gun Mayhem')">🔫<span>Gun Mayhem 1</span></div>

    <!-- Row 3 -->
    <div class="game-card" onclick="load('https://mope.io', 'Mope.io')">🐷<span>Mope.io</span></div>
    <div class="game-card" onclick="load('https://flyordie.io', 'FlyOrDie')">🪰<span>FlyOrDie.io</span></div>
</div>

<h3 id="current-game" style="text-align:center; color:var(--accent); margin-top:20px;">v1.1.5 Resources Ready</h3>

<div id="game-container">
    <iframe id="main-frame" src="about:blank" allow="fullscreen"></iframe>
</div>

<div class="version">Build: v1.1.5 | Sigma_Trees</div>

<script>
    const mathQs = ["Solve for x: 3x + 12 = 45", "Find the derivative of f(x) = x³", "Calculate area: r=5, π=3.14", "Simplify: (x²+x)/x"];
    
    function load(url, name) {
        document.getElementById('main-frame').src = url;
        document.getElementById('current-game').innerText = "Resource: " + name;
    }

    function toggleStealth() {
        const overlay = document.getElementById('math-overlay');
        const isHidden = overlay.style.display === 'none' || overlay.style.display === '';
        overlay.style.display = isHidden ? 'flex' : 'none';
        if(isHidden) {
            document.getElementById('math-q').innerText = mathQs[Math.floor(Math.random()*mathQs.length)];
        }
    }

    function goFullscreen() {
        const elem = document.getElementById('game-container');
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    }

    // Hold ESC to exit Logic
    let escTimer;
    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'p') toggleStealth();
        
        if (e.key === "Escape") {
            // Browsers force a message, but we add a 1.5s delay to the actual script exit
            escTimer = setTimeout(() => {
                if (document.fullscreenElement) document.exitFullscreen();
            }, 1500); 
        }
    });

    document.addEventListener('keyup', (e) => {
        if (e.key === "Escape") clearTimeout(escTimer);
    });

    function search() {
        let input = document.getElementById('gameSearch').value.toLowerCase();
        let cards = document.querySelectorAll('.game-card');
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(input) ? "" : "none";
        });
    }
</script>
</body>
</html>
