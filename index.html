<!DOCTYPE html>
<html>
<head>
    <title>Sigma_TreesGames | Dr. Donut's Den</title>
    <!-- Secret trick to bypass "Sad Face" errors -->
    <script type="module" src="https://unpkg.com"></script>
    <style>
        body { background-color: #022c22; color: #ecfdf5; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; position: relative; min-height: 100vh; }
        .header-bar { background-color: #000; padding: 15px; border-bottom: 3px solid #10b981; margin-bottom: 10px; }
        h1 { color: #10b981; margin: 0; font-size: 2.2em; text-shadow: 2px 2px #000; }
        
        .warning-msg { background: #7f1d1d; color: #fecaca; padding: 8px; font-size: 0.85em; font-weight: bold; border-bottom: 2px solid #b91c1c; }

        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 15px; background: #064e3b; }
        .game-card { width: 85px; cursor: pointer; transition: 0.3s; border-radius: 12px; padding: 8px; border: 2px solid transparent; }
        .game-card:hover { transform: scale(1.1); background: #022c22; border-color: #10b981; }
        .game-card img { width: 100%; border-radius: 10px; margin-bottom: 5px; }
        .game-card span { font-size: 0.65em; font-weight: bold; display: block; }

        /* Smaller Game Box for School Laptops */
        #game-container { width: 75%; max-width: 650px; height: 380px; margin: 15px auto; border: 4px solid #059669; border-radius: 12px; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .game-controls { margin-top: 10px; display: flex; justify-content: center; gap: 10px; padding-bottom: 60px; }
        .btn-action { background: #059669; color: white; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
        .btn-tab { background: #1e40af; }
        .version-tag { position: fixed; bottom: 10px; right: 15px; color: #059669; font-size: 0.7em; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>Sigma_TreesGames</h1>
    </div>

    <div class="warning-msg">
        ⚠️ U might have to click on a game 1-3 times for it to work!
    </div>

    <div class="gallery">
        <div class="game-card" onclick="changeGame('https://krew.io', 'Krew.io')">
            <img src="https://placeholder.com"><span>Krew.io</span>
        </div>
        <div class="game-card" onclick="changeGame('https://dashmetry.com', 'Dashmentry')">
            <img src="https://placeholder.com"><span>Dashmentry</span>
        </div>
        <!-- Unblocked GitHub Mirrors -->
        <div class="game-card" onclick="changeGame('https://adfree3kh0.github.io/projects/geodash/index.html', 'GD Lite')">
            <img src="https://placeholder.com"><span>GD Lite</span>
        </div>
        <div class="game-card" onclick="changeGame('https://littlebigsnake.io', 'Snake')">
            <img src="https://placeholder.com"><span>Snake</span>
        </div>
        <div class="game-card" onclick="changeGame('https://github.io', 'Slope')">
            <img src="https://placeholder.com"><span>Slope</span>
        </div>
        <div class="game-card" onclick="changeGame('https://github.io', 'FNAF')">
            <img src="https://placeholder.com"><span>FNAF</span>
        </div>
        <div class="game-card" onclick="changeGame('https://shellshock.io', 'Shell')">
            <img src="https://placeholder.com"><span>Shell</span>
        </div>
    </div>

    <h3 id="current-title" style="color:#10b981; margin-top:15px; font-size: 1.1em;">Select a Game</h3>

    <div id="game-container">
        <!-- 'is="x-frame-bypass"' fixes the sad face on many games -->
        <iframe id="main-game" is="x-frame-bypass" src="about:blank" allow="fullscreen" allowfullscreen></iframe>
    </div>

    <div class="game-controls">
        <button class="btn-action" onclick="goFullscreen();">FULLSCREEN</button>
        <button class="btn-action btn-tab" onclick="launchNewTab();">OPEN IN NEW TAB</button>
    </div>

    <div class="version-tag">v1.0.7</div>

    <script>
        function changeGame(url, name) {
            document.getElementById('main-game').src = url;
            document.getElementById('current-title').innerText = "Playing: " + name;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
        function launchNewTab() {
            var url = document.getElementById('main-game').src;
            if(url !== "about:blank") window.open(url, '_blank');
        }
        function goFullscreen() {
            var elem = document.getElementById("game-container");
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        }
    </script>
</body>
</html>
